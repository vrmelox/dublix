# ─────────────────────────────────────────────
# NGINX — Configuration Dublix pour bioqrsuivi.com
# Placer dans : /etc/nginx/sites-available/bioqrsuivi.conf
# Activer : sudo ln -s /etc/nginx/sites-available/bioqrsuivi.conf /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────

# Redirection HTTP → HTTPS
server {
    if ($host = www.bioqrsuivi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = bioqrsuivi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name bioqrsuivi.com www.bioqrsuivi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bioqrsuivi.com www.bioqrsuivi.com;

    # ── Certificats SSL (générés par Certbot) ──
    ssl_certificate /etc/letsencrypt/live/bioqrsuivi.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/bioqrsuivi.com/privkey.pem; # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logs ──
    access_log /var/log/nginx/bioqrsuivi.access.log;
    error_log  /var/log/nginx/bioqrsuivi.error.log;

    # ── Taille max des uploads ──
    client_max_body_size 50M;

    # ── API Dublix (Node.js port 4000) ──
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend Dublix (Next.js port 3005) ──
    location / {
        proxy_pass         http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
